<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>够级 - 联网对战</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --felt: #1a5c2a;
  --felt-dark: #0f3d1a;
  --felt-light: #2a7a3a;
  --gold: #d4a843;
  --gold-light: #f0d080;
  --red: #cc2222;
  --bottom-panel-h: 350px;
}

body {
  background: #0a0a0a;
  font-family: 'Noto Serif SC', serif;
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* ============ LOBBY ============ */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 40%, var(--felt-dark) 80%, #0a1a0f 100%);
  padding: 20px;
  gap: 16px;
}

.lobby-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 48px;
  color: var(--gold);
  letter-spacing: 12px;
  text-shadow: 0 0 30px rgba(212,168,67,0.4);
  margin-bottom: 10px;
}

.lobby-sub {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-bottom: 20px;
}

.lobby-input {
  width: 260px;
  padding: 12px 16px;
  font-size: 18px;
  font-family: 'Noto Serif SC', serif;
  border: 2px solid rgba(212,168,67,0.4);
  border-radius: 10px;
  background: rgba(0,0,0,0.4);
  color: #fff;
  text-align: center;
  outline: none;
}

.lobby-input::placeholder { color: rgba(255,255,255,0.3); }
.lobby-input:focus { border-color: var(--gold); }

.lobby-btn {
  width: 260px;
  padding: 14px;
  font-size: 20px;
  font-family: 'Ma Shan Zheng', cursive;
  letter-spacing: 4px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(to bottom, #d4a843, #b8922a);
  color: #1a1a1a;
}
.btn-primary:hover { background: linear-gradient(to bottom, #f0d080, #d4a843); }

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: var(--gold);
  border: 2px solid rgba(212,168,67,0.4);
}

.lobby-or {
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}

#lobby-error {
  color: #ff6b6b;
  font-size: 14px;
  min-height: 20px;
}

/* ============ WAITING ROOM ============ */
#waiting {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 40%, var(--felt-dark) 80%, #0a1a0f 100%);
  padding: 20px;
  gap: 14px;
}

.room-code {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: var(--gold-light);
  letter-spacing: 3px;
}

.room-code span {
  font-size: 40px;
  color: #fff;
  letter-spacing: 4px;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 800;
  font-style: normal;
  background: rgba(0,0,0,0.4);
  padding: 6px 18px;
  border-radius: 10px;
  border: 2px solid var(--gold);
  margin-left: 10px;
}

.player-list {
  width: 300px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  border: 1px solid rgba(212,168,67,0.2);
  padding: 14px;
}

.player-slot {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 16px;
  color: #ccc;
}
.player-slot:last-child { border-bottom: none; }

.player-slot .seat-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 700;
  margin-right: 10px;
  color: #fff;
}
.team-a-bg { background: #cc4444; }
.team-b-bg { background: #3377cc; }

.player-slot .pname {
  flex: 1;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 20px;
}
.player-slot .pname.empty { color: rgba(255,255,255,0.2); font-style: italic; }
.player-slot .host-tag {
  font-size: 11px;
  color: var(--gold);
  background: rgba(212,168,67,0.15);
  padding: 2px 6px;
  border-radius: 6px;
}

.waiting-hint {
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  text-align: center;
  line-height: 1.6;
}

#btn-start {
  width: 260px;
  padding: 14px;
  font-size: 22px;
  font-family: 'Ma Shan Zheng', cursive;
  letter-spacing: 6px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(to bottom, #d4a843, #b8922a);
  color: #1a1a1a;
  cursor: pointer;
}
#btn-start:disabled { opacity: 0.3; cursor: default; }

/* ============ GAME TABLE ============ */
#game {
  display: none;
  position: relative;
  width: 100vw;
  height: 100vh; height: 100dvh;
  background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 40%, var(--felt-dark) 80%, #0a1a0f 100%);
  overflow: hidden;
}

#game::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23000' fill-opacity='.06'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

#game-title {
  position: absolute;
  top: 8px; left: 14px;
  color: var(--gold);
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 18px;
  opacity: 0.5;
  z-index: 2;
  cursor: default;
  letter-spacing: 3px;
}

/* Player labels around the table */
.plabel {
  position: absolute;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.plabel .name-tag {
  color: var(--gold);
  font-size: 21px;
  font-family: 'Ma Shan Zheng', cursive;
  padding: 6px 14px;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  border: 1px solid rgba(212,168,67,0.2);
  white-space: nowrap;
  transition: all 0.3s;
}

.plabel .name-tag.is-turn {
  background: rgba(212,168,67,0.25);
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(212,168,67,0.4);
}

.plabel .team-indicator {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.plabel .card-info {
  font-size: 14px;
  color: rgba(255,255,255,0.64);
}

.plabel .action-text {
  font-size: 15px;
  font-family: 'Ma Shan Zheng', cursive;
  color: rgba(255,255,255,0.6);
  min-height: 18px;
}

.plabel .finish-text {
  color: var(--gold);
  font-size: 15px;
  font-family: 'Ma Shan Zheng', cursive;
  text-shadow: 0 0 8px rgba(212,168,67,0.4);
}

/* 6 positions around table (relative seat from my view) */
.plabel.pos-0 { bottom: calc(var(--bottom-panel-h) - 8px); left: 50%; transform: translateX(-50%); }
.plabel.pos-1 { bottom: 34%; right: 12px; align-items: flex-end; }
.plabel.pos-2 { top: 19%; right: 12px; align-items: flex-end; }
.plabel.pos-3 { top: 10px; left: 50%; transform: translateX(-50%); }
.plabel.pos-4 { top: 19%; left: 12px; align-items: flex-start; }
.plabel.pos-5 { bottom: 34%; left: 12px; align-items: flex-start; }

/* Played cards area per position */
.played-area {
  position: absolute;
  display: flex;
  gap: 6px;
  z-index: 4;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  max-width: min(42vw, 760px);
}

.played-area.ppos-0 { bottom: calc(var(--bottom-panel-h) + 44px); left: 50%; transform: translateX(-50%); }
.played-area.ppos-1 { bottom: 27%; right: 5.5%; }
.played-area.ppos-2 { top: 15%; right: 5.5%; }
.played-area.ppos-3 { top: 8%; left: 50%; transform: translateX(-50%); }
.played-area.ppos-4 { top: 15%; left: 5.5%; }
.played-area.ppos-5 { bottom: 27%; left: 5.5%; }

/* Cards */
.card {
  width: 58px; height: 82px;
  background: #fff;
  border-radius: 9px;
  border: 1px solid rgba(0,0,0,0.18);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.card.red { color: var(--red); }
.card.black { color: #222; }
.card.joker-big,
.card.joker-small { color: #fff; border-color: rgba(255,255,255,0.25); }
.card .rank { font-size: 16px; line-height: 1; z-index: 2; }
.card .suit { font-size: 18px; line-height: 1; z-index: 2; margin-top: 4px; }
.card .joker-face {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: saturate(1.05) contrast(1.05);
}
.card .joker-face.big {
  background-image:
    linear-gradient(135deg, rgba(255,77,43,0.68), rgba(255,146,51,0.48)),
    url('/joker-big-custom');
}
.card .joker-face.small {
  background-image:
    linear-gradient(135deg, rgba(44,91,255,0.68), rgba(89,209,255,0.44)),
    url('/joker-small-custom');
}
.card .joker-text {
  position: absolute;
  left: 5px;
  bottom: 5px;
  z-index: 2;
  font-size: 11px;
  font-family: 'Ma Shan Zheng', cursive;
  letter-spacing: 1px;
  padding: 2px 5px;
  border-radius: 6px;
  background: rgba(0,0,0,0.38);
  backdrop-filter: blur(2px);
}

.card.selected {
  transform: translateY(-12px);
  box-shadow: 0 8px 18px rgba(212,168,67,0.45);
  border-color: var(--gold);
}

.card:active { transform: translateY(-12px); }

/* Enlarged played cards */
.played-area .card {
  width: 52px; height: 74px;
  font-size: 14px; cursor: default;
  border-radius: 9px;
}
.played-area .card .rank { font-size: 15px; }
.played-area .card .suit { font-size: 18px; margin-top: 3px; }
.played-area .card .joker-text { font-size: 10px; left: 4px; bottom: 4px; padding: 1px 4px; }
.played-area .card.selected { transform: none; }

.gouji-tag {
  font-size: 10px;
  color: #ff4444;
  font-family: 'Ma Shan Zheng', cursive;
  background: rgba(255,68,68,0.15);
  padding: 1px 5px;
  border-radius: 4px;
  margin-left: 3px;
}

.kaidian-tag {
  font-size: 12px;
  color: #ffdd44;
  font-family: 'Ma Shan Zheng', cursive;
  background: rgba(255,220,68,0.2);
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid rgba(255,220,68,0.4);
  animation: kaidian-flash 0.6s ease-in-out 3;
  margin-left: 4px;
}

@keyframes kaidian-flash {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; text-shadow: 0 0 10px #ffdd44; }
}

.dian-badge {
  display: inline-block;
  font-size: 12px;
  padding: 2px 7px;
  border-radius: 999px;
  margin-left: 4px;
  border: 1px solid rgba(255,255,255,0.18);
}
.dian-open { color: #4ade80; background: rgba(74,222,128,0.18); }
.dian-closed { color: #cfcfcf; background: rgba(160,160,160,0.16); }
.dian-force { color: #ffd36a; background: rgba(255,211,106,0.16); }

.card.locked {
  opacity: 0.45;
  pointer-events: none;
}

/* Tribute notification */
#tribute-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  z-index: 90; gap: 12px;
}
#tribute-overlay.show { display: flex; }
#tribute-overlay h3 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 24px; color: var(--gold);
  letter-spacing: 4px;
}
.tribute-item {
  color: #ddd; font-size: 14px;
  padding: 4px 0;
  font-family: 'Ma Shan Zheng', cursive;
}
.tribute-item .t-type { color: var(--gold); margin-right: 6px; }
#tribute-overlay button {
  margin-top: 10px; padding: 8px 30px;
  font-size: 18px; font-family: 'Ma Shan Zheng', cursive;
  background: linear-gradient(to bottom, #d4a843, #b8922a);
  color: #1a1a1a; border: none; border-radius: 8px; cursor: pointer;
}

/* Bottom interaction panel */
#bottom-panel {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: min(1320px, 94vw);
  min-height: var(--bottom-panel-h);
  z-index: 28;
  background: linear-gradient(to bottom, rgba(10,25,18,0.78), rgba(6,16,12,0.92));
  border: 1px solid rgba(212,168,67,0.16);
  border-bottom: none;
  border-top-left-radius: 22px;
  border-top-right-radius: 22px;
  box-shadow: 0 -10px 35px rgba(0,0,0,0.28);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#panel-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 36px;
}

#turn-timer {
  color: #fff;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 22px;
  background: rgba(0,0,0,0.38);
  padding: 5px 14px;
  border-radius: 12px;
  border: 1px solid rgba(212,168,67,0.25);
  white-space: nowrap;
}

#panel-meta {
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  text-align: right;
  line-height: 1.5;
}

#actions {
  position: static;
  transform: none;
  display: flex;
  gap: 10px;
  z-index: 20;
  flex-wrap: wrap;
  justify-content: center;
}

#actions button {
  padding: 9px 22px;
  min-width: 90px;
  font-size: 18px;
  font-family: 'Ma Shan Zheng', cursive;
  border-radius: 11px;
  cursor: pointer;
  letter-spacing: 3px;
  border: 2px solid var(--gold);
  transition: all 0.2s;
}

.btn-go {
  background: linear-gradient(to bottom, #d4a843, #b8922a);
  color: #1a1a1a;
}
.btn-no {
  background: rgba(0,0,0,0.42);
  color: var(--gold);
}
.btn-special {
  background: rgba(20,20,20,0.76);
  color: #f0d080;
}
.btn-alert {
  background: linear-gradient(to bottom, #f06d4b, #bf4022);
  color: #fff7e8;
  border-color: #ffb28d !important;
}
button:disabled { opacity: 0.3; cursor: default !important; }

#my-hand-wrap {
  width: 100%;
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}

#my-hand {
  position: static;
  transform: none;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  align-content: flex-start;
  gap: 14px 12px;
  z-index: 10;
  width: 100%;
  justify-content: flex-start;
  padding: 4px 6px 18px;
}

.card-group {
  display: flex;
  align-items: flex-end;
  position: relative;
  flex-shrink: 0;
  min-height: 110px;
}

.group-count {
  position: absolute;
  bottom: -12px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.82);
  color: var(--gold-light);
  font-size: 15px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 999px;
  font-family: 'Ma Shan Zheng', cursive;
  pointer-events: none;
  border: 1px solid rgba(212,168,67,0.3);
  z-index: 11;
}

#my-meta {
  margin-top: 6px;
  padding-top: 4px;
  border-top: 1px solid rgba(212,168,67,0.15);
  color: #ddd;
  font-size: 11px;
  line-height: 1.5;
}

@media (max-width: 960px) {
  :root { --bottom-panel-h: 334px; }
  .card { width: 50px; height: 72px; }
  .card .rank { font-size: 14px; }
  .card .suit { font-size: 15px; }
  #turn-timer { font-size: 18px; }
  #actions button { min-width: 78px; padding: 8px 14px; font-size: 16px; letter-spacing: 2px; }
  .played-area { max-width: min(84vw, 760px); gap: 4px; }
  .played-area .card { width: 48px; height: 68px; border-radius: 8px; }
  .played-area .card .rank { font-size: 13px; }
  .played-area .card .suit { font-size: 16px; margin-top: 3px; }
  .played-area .card .joker-text { font-size: 8px; left: 3px; bottom: 3px; }
  .played-area.ppos-0 { bottom: calc(var(--bottom-panel-h) + 34px); }
  .played-area.ppos-1 { right: 3%; }
  .played-area.ppos-2 { right: 3%; }
  .played-area.ppos-4 { left: 3%; }
  .played-area.ppos-5 { left: 3%; }
  .plabel.pos-1, .plabel.pos-2 { right: 4px; }
  .plabel.pos-4, .plabel.pos-5 { left: 4px; }
}

@media (max-width: 640px) {
  :root { --bottom-panel-h: 348px; }
  #bottom-panel { width: 100vw; border-radius: 18px 18px 0 0; padding-left: 10px; padding-right: 10px; }
  #panel-top { align-items: flex-start; flex-direction: column; }
  #panel-meta { text-align: left; }
  #actions { justify-content: flex-start; }
  .card { width: 46px; height: 68px; border-radius: 8px; }
  .card-group { min-height: 90px; }
  .played-area { max-width: 92vw; gap: 3px; }
  .played-area .card { width: 42px; height: 60px; border-radius: 7px; }
  .played-area .card .rank { font-size: 12px; }
  .played-area .card .suit { font-size: 14px; margin-top: 2px; }
  .played-area .card .joker-text { font-size: 8px; left: 3px; bottom: 3px; }
  .played-area.ppos-0 { bottom: calc(var(--bottom-panel-h) + 28px); }
  .played-area.ppos-1 { right: 2%; }
  .played-area.ppos-2 { right: 2%; }
  .played-area.ppos-4 { left: 2%; }
  .played-area.ppos-5 { left: 2%; }
}

/* Rankings */
#rankings-panel {
  position: absolute;
  top: 6px; right: 8px;
  z-index: 15;
  color: var(--gold);
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 8px;
  padding: 6px 10px;
  min-width: 80px;
}
#rankings-panel h4 { font-size: 13px; text-align: center; margin-bottom: 3px; border-bottom: 1px solid rgba(212,168,67,0.15); padding-bottom: 3px; }

/* Message toast */
#toast {
  position: fixed;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 18px;
  font-family: 'Ma Shan Zheng', cursive;
  padding: 12px 30px;
  border-radius: 12px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  letter-spacing: 3px;
}
#toast.show { opacity: 1; }

/* Game over overlay */
#gameover {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  z-index: 100;
  gap: 16px;
}
#gameover.show { display: flex; }
#gameover h2 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 32px;
  color: var(--gold);
  letter-spacing: 6px;
}
#gameover .go-detail {
  color: #ccc;
  font-size: 16px;
  text-align: center;
  line-height: 2;
}
#gameover button {
  padding: 12px 36px;
  font-size: 20px;
  font-family: 'Ma Shan Zheng', cursive;
  background: linear-gradient(to bottom, #d4a843, #b8922a);
  color: #1a1a1a;
  border: none; border-radius: 10px;
  cursor: pointer;
  letter-spacing: 4px;
}

#peek-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 130;
}
#peek-overlay.show { display: flex; }
#peek-box {
  width: min(1100px, 94vw);
  background: linear-gradient(to bottom, rgba(16,28,20,0.96), rgba(8,14,10,0.98));
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}
#peek-box h3 {

<body>

<!-- ============ LOBBY ============ -->
<div id="lobby">

  <div class="lobby-sub">山东扑克 · 六人联网对战</div>

</div>

<!-- Toast -->

<!-- Tribute notification -->

  </div>

  <div id="strategist-body"></div>

<div id="peek-overlay">

<!-- Game over -->
<div id="gameover">
  <h2 id="go-title"></h2>
  <div class="go-detail" id="go-detail"></div>
  <button id="go-btn" onclick="doRestart()">再 来 一 局</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============ CONSTANTS ============
const RANK_NAMES = {3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A',15:'2',16:'小',17:'大'};
const SUIT_SYMBOLS = ['♠','♥','♦','♣'];
const SUIT_COLORS = ['black','red','red','black'];
const TEAM_A = [0,2,4], TEAM_B = [1,3,5];
const RANK_LABELS = ['','头科','二科','三科','四科','二落','大落'];

let socket = null;
let mySeat = -1;
let myRoom = '';
let isHost = false;
let selectedCards = [];
let currentState = null;
let dragSelectState = { active: false, add: true, seen: new Set(), timer: null };
let countdownTimer = null;

// Cheat
let _cClicks = 0, _cTimer = null;

function unlockAudio() {
  audioUnlocked = true;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  } catch (_) {}
}
['click', 'touchend', 'keydown'].forEach(evt => {
  window.addEventListener(evt, unlockAudio, { passive: true, once: true });
});

function playToneSequence(tones, gainValue = 0.035) {
  try {
    if (!audioUnlocked) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    tones.forEach((tone, idx) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = tone.type || 'sine';
      osc.frequency.value = tone.freq;
      gain.gain.setValueAtTime(0.0001, now + tone.at);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + tone.at + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + tone.at + tone.dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + tone.at);
      osc.stop(now + tone.at + tone.dur + 0.02);
    });
  } catch (_) {}
}

function playSecretSound() {
  playToneSequence([
    { freq: 880, at: 0.00, dur: 0.08, type: 'triangle' },
    { freq: 1174, at: 0.10, dur: 0.08, type: 'triangle' },
  ], 0.02);
}

function playCaughtSound() {
  playToneSequence([
    { freq: 520, at: 0.00, dur: 0.09, type: 'square' },
    { freq: 390, at: 0.11, dur: 0.11, type: 'square' },
  ], 0.03);
}

function playCardSound() {
  playToneSequence([
    { freq: 180, at: 0.00, dur: 0.018, type: 'square' },
    { freq: 120, at: 0.018, dur: 0.040, type: 'triangle' },
  ], 0.035);
}

function playGoujiSound() {
  playToneSequence([
    { freq: 392, at: 0.00, dur: 0.05, type: 'square' },
    { freq: 523, at: 0.06, dur: 0.06, type: 'square' },
    { freq: 784, at: 0.14, dur: 0.09, type: 'triangle' },
    { freq: 1046, at: 0.24, dur: 0.12, type: 'triangle' },
  ], 0.04);
}

function playBurnSound() {
  playToneSequence([
    { freq: 260, at: 0.00, dur: 0.06, type: 'sawtooth' },
    { freq: 330, at: 0.06, dur: 0.06, type: 'sawtooth' },
    { freq: 660, at: 0.14, dur: 0.12, type: 'square' },
  ], 0.04);
}

function playJieShaoSound() {
  playToneSequence([
    { freq: 740, at: 0.00, dur: 0.07, type: 'triangle' },
    { freq: 540, at: 0.09, dur: 0.08, type: 'triangle' },
  ], 0.025);
}

function speakTurnPrompt() {
  playToneSequence([
    { freq: 740, at: 0.00, dur: 0.05, type: 'triangle' },
    { freq: 880, at: 0.06, dur: 0.05, type: 'triangle' },
  ], 0.016);
}

function onTitleClick() {
  if (!isHost) return;
  _cClicks++;
  clearTimeout(_cTimer);
  _cTimer = setTimeout(() => { _cClicks = 0; }, 500);
  if (_cClicks >= 3) {
    _cClicks = 0;
    socket.emit('cheat_toggle');
  }
}

// ============ CONNECTION ============
function connect() {
  socket = io();

  socket.on('room_joined', (data) => {
    myRoom = data.code;
    mySeat = data.seat;
    isHost = data.seat === 0;
    showWaiting(data.code, data.players);
  });

  socket.on('player_list', (data) => {
    renderPlayerList(data.players);
  });

  socket.on('game_state', (state) => {
    const prevHandIds = new Set((currentState?.myHand || []).map(c => c.id));
    const nextHandIds = new Set((state?.myHand || []).map(c => c.id));
    const sameHand = prevHandIds.size === nextHandIds.size && [...prevHandIds].every(id => nextHandIds.has(id));
    const sameTurn = currentState?.currentPlayer === state?.currentPlayer && state?.currentPlayer === state?.mySeat;
    currentState = state;
    if (sameHand && sameTurn) {
      selectedCards = selectedCards.filter(c => nextHandIds.has(c.id));
    } else {
      selectedCards = [];
    }
    stopDragSelect();
    showGame(state);
  });

  socket.on('game_over', (data) => {
    showGameOver(data);
  });

  socket.on('back_to_lobby', (data) => {
    document.getElementById('gameover').classList.remove('show');
  hidePeekOverlay();
    document.getElementById('game').style.display = 'none';
    document.getElementById('waiting').style.display = 'flex';
    hidePeekOverlay();
    renderPlayerList(data.players);
  });

  socket.on('error_msg', (data) => {
    toast(data.msg);
  });

  socket.on('toast_msg', (data) => {
    if (data && data.msg) toast(data.msg);
  });

  socket.on('sound_cue', (data) => {
    const t = data?.type || 'secret';
    if (t === 'caught') playCaughtSound();
    else if (t === 'gouji') playGoujiSound();
    else if (t === 'burn') playBurnSound();
    else if (t === 'jieshao') playJieShaoSound();
    else if (t === 'play') playCardSound();
    else playSecretSound();
  });

  socket.on('peek_result', (data) => {
    showPeekOverlay(data);
  });

  socket.on('strategist_result', (data) => {
    showStrategistPanel(data);
  });

  socket.on('cheat_status', (data) => {
    const el = document.getElementById('game-title');
    if (el) {
      el.style.color = data.armed ? '#e85d5d' : '';
      el.style.opacity = data.armed ? '0.85' : '';
    }
    toast(data.armed ? '已激活' : '已取消');
  });

  socket.on('player_disconnected', (data) => {
    toast('有玩家掉线了');
  });
}

// ============ LOBBY ACTIONS ============
function doCreate() {
  const name = document.getElementById('input-name').value.trim() || '房主';
  if (!socket) connect();
  socket.emit('create_room', { name });
}

function doJoin() {
  const name = document.getElementById('input-name').value.trim() || '玩家';
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  if (!code || code.length < 4) { toast('请输入4位房间号'); return; }
  if (!socket) connect();
  socket.emit('join_room', { code, name });
}

function doStart() {
  socket.emit('start_game');
}

function doRestart() {
  if (isHost) socket.emit('restart_game');
}

// ============ WAITING ROOM ============
function showWaiting(code, players) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waiting').style.display = 'flex';
  document.getElementById('room-code-display').textContent = code;
  renderPlayerList(players);
}

function renderPlayerList(players) {
  const el = document.getElementById('player-list');
  let html = '';
  for (let i = 0; i < 6; i++) {
    const p = players.find(pp => pp.seat === i);
    const isTeamA = TEAM_A.includes(i);
    const teamClass = isTeamA ? 'team-a-bg' : 'team-b-bg';
    const teamLabel = isTeamA ? '红' : '蓝';
    html += `<div class="player-slot">
      <div class="seat-num ${teamClass}">${i+1}</div>
      <div class="pname ${p ? '' : 'empty'}">${p ? p.name : '等待加入...'}</div>
      ${p && p.seat === 0 ? '<span class="host-tag">房主</span>' : ''}
      ${p && p.seat === mySeat ? '<span class="host-tag">你</span>' : ''}
    </div>`;
  }
  el.innerHTML = html;

  const btn = document.getElementById('btn-start');
  if (isHost) {
    btn.style.display = '';
    btn.disabled = players.length < 6;
    document.getElementById('wait-hint').textContent = players.length < 6
      ? `等待玩家加入... (${players.length}/6)`
      : '人齐了，可以开始！';
  } else {
    btn.style.display = 'none';
    document.getElementById('wait-hint').textContent = `等待房主开始游戏 (${players.length}/6)`;
  }
}

// ============ GAME RENDERING ============
let _lastShownRound = 0;

function showGame(state) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('gameover').classList.remove('show');
  hidePeekOverlay();

  renderLabels(state);
  renderPlayedAreas(state);
  renderMyHand(state);
  renderRankings(state);

  const isMyTurn = state.currentPlayer === state.mySeat && !state.finished[state.mySeat];
  const hasTable = !!state.tablePlay;
  const isKaiDianTurn = state.canKaiDian === state.mySeat && !state.finished[state.mySeat];
  document.getElementById('btn-play').disabled = !isMyTurn || isKaiDianTurn;
  document.getElementById('btn-play').style.display = isKaiDianTurn ? 'none' : '';
  document.getElementById('btn-normal4').style.display = isKaiDianTurn ? '' : 'none';
  document.getElementById('btn-normal4').disabled = !isKaiDianTurn;
  document.getElementById('btn-kaidian').style.display = isKaiDianTurn ? '' : 'none';
  document.getElementById('btn-kaidian').disabled = !isKaiDianTurn;
  document.getElementById('btn-pass').disabled = !isMyTurn || (!hasTable && !isKaiDianTurn);
  document.getElementById('btn-let').style.display = state.canLet ? '' : 'none';
  document.getElementById('btn-let').disabled = !state.canLet;
  document.getElementById('btn-naoji').disabled = state.finished[state.mySeat] || (state.naojiUses[state.mySeat] >= state.naojiMax[state.mySeat]);
  document.getElementById('btn-grab').disabled = state.finished[state.mySeat];
  document.getElementById('btn-callgong').style.display = 'none';
  document.getElementById('btn-callgong').disabled = true;
  document.getElementById('btn-peek').style.display = (state.peekMax?.[state.mySeat] || 0) > 0 ? '' : 'none';
  document.getElementById('btn-peek').disabled = !state.canPeek || state.finished[state.mySeat];
  document.getElementById('btn-strategist').style.display = state.canStrategist ? '' : 'none';
  document.getElementById('btn-strategist').disabled = !state.canStrategist;
  if (!state.canStrategist) hideStrategistPanel();
  renderTimer(state);

  const becameMyTurn = state.currentPlayer === state.mySeat && lastTurnPlayer !== state.mySeat;
  if (becameMyTurn) speakTurnPrompt();
  lastTurnPlayer = state.currentPlayer;

  const panelMeta = document.getElementById('panel-meta');
  if (panelMeta) {
    const peekUsed = state.peekUses?.[state.mySeat] ?? 0;
    const peekMax = state.peekMax?.[state.mySeat] ?? 0;
    const peekText = peekMax > 0 ? `　|　验牌：${peekUsed}/${peekMax}${state.canPeek ? '（可用）' : '（仅他人回合）'}` : '';
    const strategistText = state.canStrategist ? `　|　狗头军师：可看${(state.strategistTargets || []).length}名队友` : '';
    const tributeText = `　|　点贡:${state.dianTributeDebt?.[state.mySeat] ?? 0} 烧贡:${state.burnTributeDebt?.[state.mySeat] ?? 0} 闷贡:${state.menTributeDebt?.[state.mySeat] ?? 0}`;
    const letText = state.canLet ? '　|　可让牌' : '';
    const phaseText = state.isChaosPhase ? '　|　四人乱缠' : (state.noHeadSeat >= 0 ? `　|　无头：${getPlayerName(state, state.noHeadSeat)}` : '');
    panelMeta.innerHTML = `已出牌池：${state.playedPoolCount || 0}张　|　孬急：${state.naojiUses?.[state.mySeat] ?? 0}/${state.naojiMax?.[state.mySeat] ?? 5}${peekText}${strategistText}${tributeText}${letText}${phaseText}`;
  }

  const goBtn = document.getElementById('go-btn');
  goBtn.style.display = isHost ? '' : 'none';

  // Show tribute/buySan notification once per round
  if (state.roundNumber && state.roundNumber !== _lastShownRound) {
    _lastShownRound = state.roundNumber;
    const tLog = state.tributeLog || [];
    const bLog = state.buySanLog || [];
    if (tLog.length > 0 || bLog.length > 0) {
      showTributeOverlay(state, tLog, bLog);
    }
  }
}

function getRelativeSeat(absSeat, myS) {
  return (absSeat - myS + 6) % 6;
}

function getPlayerName(state, absSeat) {
  const p = state.players.find(pp => pp.seat === absSeat);
  return p ? p.name : ('座位' + (absSeat+1));
}

function renderLabels(state) {
  const container = document.getElementById('player-labels');
  let html = '';
  for (let abs = 0; abs < 6; abs++) {
    const rel = getRelativeSeat(abs, state.mySeat);
    const name = getPlayerName(state, abs);
    const isTeamA = TEAM_A.includes(abs);
    const isTurn = state.currentPlayer === abs && !state.finished[abs];
    const isDuiTou = (abs + 3) % 6 === state.mySeat;

    let extra = '';
    if (abs === state.mySeat) extra = '(我)';
    else if (isDuiTou) extra = '(对头)';
    if (state.noHeadSeat === abs) extra += '·无头';

    // 开点 badge
    let dianHtml = '';
    const streak = state.dianSkipStreak?.[abs] ?? 0;
    if (state.openedDian && state.openedDian[abs]) {
      dianHtml = '<span class="dian-badge dian-open">已开点</span>';
    } else if (state.lostKaiDian && state.lostKaiDian[abs]) {
      dianHtml = `<span class="dian-badge dian-closed">未开点${streak > 0 ? `·${streak}` : ''}</span>`;
    } else if (streak > 0) {
      dianHtml = `<span class="dian-badge dian-closed">未开点·${streak}</span>`;
    }
    if (state.calledTributeSeats && state.calledTributeSeats[abs]) {
      dianHtml += '<span class="dian-badge dian-closed">下局叫贡</span>';
    }

    let statusHtml = '';
    if (state.finished[abs]) {
      const ri = state.rankings.indexOf(abs);
      statusHtml = `<div class="finish-text">${RANK_LABELS[ri+1]}</div>`;
    } else if (rel !== 0) {
      statusHtml = `<div class="card-info">${state.handCounts[abs]}张 ${dianHtml}</div>`;
    } else {
      statusHtml = `<div class="card-info">${dianHtml}</div>`;
    }

    let actionHtml = '';
    const act = state.playerActions[abs];
    if (act && act.type === 'pass') {
      actionHtml = '<div class="action-text" style="color:rgba(255,255,255,0.35)">过</div>';
    } else if (act && act.type === 'yield') {
      actionHtml = '<div class="action-text" style="color:rgba(255,220,120,0.8)">让</div>';
    } else if (act && act.type === 'timeout') {
      actionHtml = '<div class="action-text" style="color:rgba(255,255,255,0.35)">超时</div>';
    }

    html += `<div class="plabel pos-${rel}">
      <div class="name-tag ${isTurn ? 'is-turn' : ''}">
        <span class="team-indicator" style="background:${isTeamA ? '#cc4444' : '#3377cc'}"></span>
        ${name} ${extra}
      </div>
      ${statusHtml}
      ${actionHtml}
    </div>`;
  }
  container.innerHTML = html;
}

function renderPlayedAreas(state) {
  const container = document.getElementById('played-areas');
  let html = '';
  for (let abs = 0; abs < 6; abs++) {
    const rel = getRelativeSeat(abs, state.mySeat);
    const act = state.playerActions[abs];
    let content = '';
    if (act && act.type === 'play' && act.cards) {
      act.cards.forEach(c => { content += cardHTML(c, true); });
      if (act.isKaiDian) {
        content += '<span class="kaidian-tag">开 点 !</span>';
      } else if (act.isCallGong) {
        content += '<span class="kaidian-tag" style="color:#ffd6c6;background:rgba(240,109,75,0.18);border-color:rgba(255,178,141,0.4)">叫 贡 4</span>';
      } else if (act.isNormalFour) {
        content += '<span class="kaidian-tag" style="color:#c8f0ff;background:rgba(72,160,220,0.18);border-color:rgba(120,200,255,0.4)">平 出 4</span>';
      } else if (isGoujiPlayClient(act.cards)) {
        content += '<span class="gouji-tag">够级</span>';
      }
    }
    html += `<div class="played-area ppos-${rel}">${content}</div>`;
  }
  container.innerHTML = html;
}

function renderMyHand(state) {
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  const hand = state.myHand;
  if (!hand || hand.length === 0) return;

  const nonThreeCount = hand.filter(c => c.rank !== 3).length;
  const canPlay3 = nonThreeCount === 0;
  const isKaiDianTurn = state.canKaiDian === state.mySeat;

  const groups = [];
  let cur = null;
  for (const card of hand) {
    if (!cur || cur.rank !== card.rank) {
      cur = { rank: card.rank, cards: [] };
      groups.push(cur);
    }
    cur.cards.push(card);
  }

  groups.forEach(group => {
    const groupEl = document.createElement('div');
    groupEl.className = 'card-group';
    const ov = group.cards.length <= 4 ? 18 : 14;

    let isLocked = false;
    if (isKaiDianTurn) {
      isLocked = group.rank !== 4;
    } else {
      isLocked = (group.rank === 3 && !canPlay3);
    }

    group.cards.forEach((card, idx) => {
      const el = createCardEl(card);
      if (idx > 0) el.style.marginLeft = (-58 + ov) + 'px';
      if (selectedCards.some(c => c.id === card.id)) el.classList.add('selected');
      if (isLocked) el.classList.add('locked');

      if (!isLocked) {
        el.dataset.cardId = String(card.id);
        el.addEventListener('click', () => toggleSelect(card));
        el.addEventListener('pointerdown', (e) => beginDragSelect(card, e));
        let lastTap = 0;
        el.addEventListener('touchend', (e) => {
          const now = Date.now();
          if (now - lastTap < 300) { e.preventDefault(); toggleGroupSelect(group.cards); }
          lastTap = now;
        });
        el.addEventListener('dblclick', (e) => { e.preventDefault(); toggleGroupSelect(group.cards); });
      }

      groupEl.appendChild(el);
    });

    if (group.cards.length > 1) {
      const badge = document.createElement('div');
      badge.className = 'group-count';
      badge.textContent = '×' + group.cards.length;
      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        const suggested = getSuggestedSelectCards(group.cards[0]);
        toggleGroupSelect(suggested);
      });
      groupEl.appendChild(badge);
    }

    if (!isLocked) {
      groupEl.addEventListener('click', (e) => {
        if (e.target !== groupEl) return;
        const suggested = getSuggestedSelectCards(group.cards[0]);
        toggleGroupSelect(suggested);
      });
    }

    if (isLocked) {
      const lock = document.createElement('div');
      lock.className = 'group-count';
      lock.style.color = '#f87171';
      if (isKaiDianTurn && group.rank !== 4) lock.textContent = '🔒仅4';
      else lock.textContent = group.rank === 3 ? '🔒末手' : '🔒开点';
      groupEl.appendChild(lock);
    }

    container.appendChild(groupEl);
  });
}

function renderRankings(state) {
  const el = document.getElementById('rank-list');
  if (!state.rankings || state.rankings.length === 0) {
    el.innerHTML = '<div style="color:#666;font-size:11px">—</div>';
    return;
  }
  el.innerHTML = state.rankings.map((s, i) => {
    const name = getPlayerName(state, s);
    const team = TEAM_A.includes(s) ? '🔴' : '🔵';
    return `<div style="font-size:12px;padding:1px 0">${RANK_LABELS[i+1]} ${team} ${name}</div>`;
  }).join('');

  const myMeta = document.getElementById('my-meta');
  if (myMeta) {
    const used = state.naojiUses?.[state.mySeat] ?? 0;
    const max = state.naojiMax?.[state.mySeat] ?? 5;
    const peekUsed = state.peekUses?.[state.mySeat] ?? 0;
    const peekMax = state.peekMax?.[state.mySeat] ?? 0;
    const peekTxt = peekMax > 0 ? `<br>验牌：${peekUsed}/${peekMax}${state.canPeek ? '（可用）' : '（仅他人回合）'}` : '';
    const strategistTxt = state.canStrategist ? `<br>狗头军师：可看${(state.strategistTargets || []).length}名队友` : '';
    myMeta.innerHTML = `孬急：${used}/${max}${peekTxt}${strategistTxt}`;
  }
}

// ============ CARD HELPERS ============
function createCardEl(card) {
  const el = document.createElement('div');
  el.className = 'card';
  if (card.rank === 17) {
    el.classList.add('joker-big');
    el.innerHTML = '<div class="joker-face big"></div><span class="joker-text">大王</span>';
  } else if (card.rank === 16) {
    el.classList.add('joker-small');
    el.innerHTML = '<div class="joker-face small"></div><span class="joker-text">小王</span>';
  } else {
    el.classList.add(SUIT_COLORS[card.suit]);
    el.innerHTML = `<span class="rank">${RANK_NAMES[card.rank]}</span><span class="suit">${SUIT_SYMBOLS[card.suit]}</span>`;
  }
  return el;
}

function cardHTML(card, mini) {
  let cls = 'card';
  let inner = '';
  if (card.rank === 17) { cls += ' joker-big'; inner = '<div class="joker-face big"></div><span class="joker-text">大王</span>'; }
  else if (card.rank === 16) { cls += ' joker-small'; inner = '<div class="joker-face small"></div><span class="joker-text">小王</span>'; }
  else { cls += ' ' + SUIT_COLORS[card.suit]; inner = `<span class="rank">${RANK_NAMES[card.rank]}</span><span class="suit">${SUIT_SYMBOLS[card.suit]}</span>`; }
  return `<div class="${cls}">${inner}</div>`;
}

function isGoujiPlayClient(cards) {
  if (!cards || cards.length === 0) return false;
  const hasJoker = cards.some(c => c.rank >= 16);
  if (hasJoker) return true;
  const r = cards.filter(c => c.rank <= 14);
  if (r.length === 0) {
    if (cards.some(c => c.rank === 15)) return true;
    return false;
  }
  const baseRank = r[0].rank;
  const count = cards.length;
  if (baseRank === 10 && count >= 5) return true;
  if (baseRank === 11 && count >= 4) return true;
  if (baseRank === 12 && count >= 3) return true;
  if (baseRank === 13 && count >= 2) return true;
  if (baseRank === 14 && count >= 2) return true;
  if (baseRank === 15) return true;
  return false;
}

// ============ INTERACTIONS ============
function getHandGroupCardsByRank(rank) {
  const hand = currentState?.myHand || [];
  return hand.filter(c => c.rank === rank);
}

function getSuggestedSelectCards(card) {
  const hand = currentState?.myHand || [];
  const rankCards = getHandGroupCardsByRank(card.rank);
  if (!rankCards.length) return [card];

  const isResponseTurn = !!currentState?.tablePlay && currentState?.currentPlayer === currentState?.mySeat;
  const targetCount = currentState?.tablePlay?.cards?.length || 1;

  if (currentState?.canKaiDian === currentState?.mySeat && card.rank === 4) {
    return rankCards;
  }

  if (isResponseTurn && targetCount > 1) {
    if ([15,16,17].includes(card.rank)) {
      if (rankCards.length >= targetCount) return rankCards.slice(0, targetCount);
      const fillers = hand.filter(c => [15,16,17].includes(c.rank) && c.rank !== card.rank);
      if (rankCards.length + fillers.length >= targetCount) {
        return [...rankCards, ...fillers.slice(0, targetCount - rankCards.length)];
      }
    }
    if (card.rank >= 3 && card.rank <= 14) {
      if (rankCards.length >= targetCount) return rankCards.slice(0, targetCount);
      const fillers = hand.filter(c => [15,16,17].includes(c.rank));
      if (rankCards.length + fillers.length >= targetCount) {
        return [...rankCards, ...fillers.slice(0, targetCount - rankCards.length)];
      }
    }
  }
  return [card];
}

function setCardSelection(card, shouldSelect) {
  const idx = selectedCards.findIndex(c => c.id === card.id);
  if (shouldSelect) {
    if (idx < 0) selectedCards.push(card);
  } else if (idx >= 0) {
    selectedCards.splice(idx, 1);
  }
}

function toggleSelect(card) {
  const idx = selectedCards.findIndex(c => c.id === card.id);
  if (idx >= 0) {
    selectedCards.splice(idx, 1);
  } else {
    const suggested = getSuggestedSelectCards(card);
    const responseTurn = !!currentState?.tablePlay && currentState?.currentPlayer === currentState?.mySeat;
    if (responseTurn && selectedCards.length > 0) {
      selectedCards = [...suggested];
    } else {
      suggested.forEach(c => { if (!selectedCards.some(s => s.id === c.id)) selectedCards.push(c); });
    }
  }
  if (currentState) renderMyHand(currentState);
}

function toggleGroupSelect(cards) {
  const ids = new Set((cards || []).map(c => c.id));
  if (!ids.size) return;
  const allSel = [...ids].every(id => selectedCards.some(s => s.id === id));
  if (allSel) {
    selectedCards = selectedCards.filter(s => !ids.has(s.id));
  } else {
    (cards || []).forEach(c => { if (!selectedCards.some(s => s.id === c.id)) selectedCards.push(c); });
  }
  if (currentState) renderMyHand(currentState);
}

function beginDragSelect(card, e) {
  clearTimeout(dragSelectState.timer);
  dragSelectState.timer = setTimeout(() => {
    dragSelectState.active = true;
    dragSelectState.add = !selectedCards.some(s => s.id === card.id);
    dragSelectState.seen = new Set();
    dragApplyCard(card);
  }, 180);
}

function dragApplyCard(card) {
  if (!dragSelectState.active || !card || dragSelectState.seen.has(card.id)) return;
  dragSelectState.seen.add(card.id);
  setCardSelection(card, dragSelectState.add);
  if (currentState) renderMyHand(currentState);
}

function findCardById(id) {
  return (currentState?.myHand || []).find(c => String(c.id) === String(id)) || null;
}

document.addEventListener('pointermove', (e) => {
  if (!dragSelectState.active) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cardEl = el?.closest?.('.card[data-card-id]');
  if (!cardEl) return;
  const card = findCardById(cardEl.dataset.cardId);
  if (card) dragApplyCard(card);
});

function stopDragSelect() {
  clearTimeout(dragSelectState.timer);
  dragSelectState.timer = null;
  dragSelectState.active = false;
  dragSelectState.seen = new Set();
}

document.addEventListener('pointerup', stopDragSelect);
document.addEventListener('pointercancel', stopDragSelect);

  socket.emit('play_cards', { cardIds: selectedCards.map(c => c.id), mode: 'normal' });
}

function renderTimer(state) {
  const el = document.getElementById('turn-timer');
  if (!el) return;
  clearInterval(countdownTimer);
  const tick = () => {
    if (!currentState || !currentState.turnEndsAt) {
      el.textContent = '倒计时：--';
      return;
    }
    const left = Math.max(0, Math.ceil((currentState.turnEndsAt - Date.now()) / 1000));
    const isMine = currentState.currentPlayer === currentState.mySeat && !currentState.finished[currentState.mySeat];
    el.textContent = `倒计时：${left}s${isMine ? '（你的回合）' : ''}`;
  };
  tick();
  countdownTimer = setInterval(tick, 250);
}

// ============ GAME OVER ============
function showGameOver(data) {
  const { rankings, players } = data;
  const myRankIdx = rankings.indexOf(mySeat);

  const topThree = rankings.slice(0, 3);
  const myTeam = TEAM_A.includes(mySeat) ? TEAM_A : TEAM_B;
  const allMine = topThree.every(s => myTeam.includes(s));
  const allTheirs = topThree.every(s => !myTeam.includes(s));

  const teamASum = rankings.map((s,i) => TEAM_A.includes(s) ? i+1 : 0).reduce((a,b)=>a+b,0);
  const teamBSum = rankings.map((s,i) => TEAM_B.includes(s) ? i+1 : 0).reduce((a,b)=>a+b,0);
  const myTeamIsA = TEAM_A.includes(mySeat);
  const mySum = myTeamIsA ? teamASum : teamBSum;
  const theirSum = myTeamIsA ? teamBSum : teamASum;

  let title;
  if (allMine) title = '🎉 串三户！大胜！';
  else if (allTheirs) title = '😢 被串三户...';
  else if (mySum < theirSum) title = '🎉 胜利！';
  else if (mySum > theirSum) title = '😢 败了...';
  else title = '🤝 平局';

  let detail = '';
  rankings.forEach((s, i) => {
    const p = players.find(pp => pp.seat === s);
    const name = p ? p.name : '?';
    const team = TEAM_A.includes(s) ? '🔴' : '🔵';
    const me = s === mySeat ? ' ← 你' : '';
    detail += `${RANK_LABELS[i+1]}: ${team} ${name}${me}\n`;
  });

  document.getElementById('go-title').textContent = title;
  document.getElementById('go-detail').textContent = detail;
  document.getElementById('go-btn').style.display = isHost ? '' : 'none';
  document.getElementById('gameover').classList.remove('show');
}



let peekTimer = null;

function showPeekOverlay(data) {
  const grid = document.getElementById('peek-grid');
  const overlay = document.getElementById('peek-overlay');
  if (!grid || !overlay || !data?.sides) return;

  grid.innerHTML = data.sides.map(side => `
    <div class="peek-side">
      <div class="peek-side-title">${side.side} · ${side.name}（${side.cards.length}张）</div>
      <div class="peek-cards">${side.cards.map(card => cardHTML(card, true)).join('')}</div>
    </div>
  `).join('');

  const note = document.getElementById('peek-note');
  if (note) {
    const uses = data.uses ?? 0;
    const max = data.max ?? 3;
    note.textContent = `3秒可见｜验牌 ${uses}/${max}`;
  }

  overlay.classList.add('show');
  clearTimeout(peekTimer);
  const delay = Math.max(2500, data.displayMs || 3000);
  peekTimer = setTimeout(hidePeekOverlay, delay);
}

function hidePeekOverlay() {
  document.getElementById('peek-overlay')?.classList.remove('show');
}

      <div class="strategist-cards">${item.cards.map(card => cardHTML(card, true)).join('')}</div>

function hideStrategistPanel() {

}

function showTributeOverlay(state, tLog, bLog) {
  const overlay = document.getElementById('tribute-overlay');
  const title = document.getElementById('tribute-title');
  const content = document.getElementById('tribute-content');

  const lines = [];
  if (tLog && tLog.length) {
    title.textContent = '进贡 / 还贡';
    tLog.forEach(item => {
      lines.push(`<div class="tribute-item"><span class="t-type">${item.type}</span>${getPlayerName(state, item.from)} → ${getPlayerName(state, item.to)} ：进 ${Array.isArray(item.give) ? item.give.join('、') : ''}　还 ${Array.isArray(item.back) ? item.back.join('、') : ''}</div>`);
    });
  }
  if (bLog && bLog.length) {
    if (!tLog || !tLog.length) title.textContent = '买三';
    bLog.forEach(item => {
      if (item.seller === -1) {
        lines.push(`<div class="tribute-item"><span class="t-type">买三</span>${getPlayerName(state, item.buyer)}：${item.note || '跳过'}</div>`);
      } else {
        lines.push(`<div class="tribute-item"><span class="t-type">买三</span>${getPlayerName(state, item.buyer)} 向 ${getPlayerName(state, item.seller)} 买3，支付：${item.paid}</div>`);
      }
    });
  }

  if (!lines.length) return;
  content.innerHTML = lines.join('');
  overlay.classList.add('show');
}

function closeTribute() {
  document.getElementById('tribute-overlay').classList.remove('show');
}

// ============ TOAST ============
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}
